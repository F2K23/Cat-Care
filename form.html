<html lang="en-US">
<head>
<title>sign up for a chance to win supplies for your pets!</title>
<link rel="" href="style.css">
</head>
<body>
    <!--heading for sign-up page-->
<header>
    <h1>sign up for a chance to win a year supply of products for your cat!</h1>
    <p>complete this short survey to win!</p>
</header>

<hr>
<!--links to index.html and style.css-->
<a href="index.html" class="care">home</a>
<a href="">Care-Plus</a>
<a href="form.html">sign up</a>

<form action="https://formdump.codeinstitute.net" method="POST">

    <fieldset>
        <!--personal details to the person-->
        <legend>Your Details</legend>

        <div>
            <label for="name-field">Name</label>
            <input id="name-field" type="text" name="full-name" 
            placeholder="your name" required>
        </div>

        <div>
    <label for="email-field">Email</label>
    <input id="email-field" type="email" name="email" placeholder="Your email" 
    required>
        </div>

        <label for="age">Age</label>
        <select id="age" name="age" required>
            <option value="under-20">Under 20</option>
            <option value="20s">20-29</option>
            <option value="30s">30-39</option>
            <option value="40s">40-49</option>
            <option value="50s">50-59</option>
            <option value="60+">60+</option>
        </select>
 </fieldset>
 <fieldset>
    <!--favourite breed of cat-->
    <legend>we care, for your care!</legend>
<div>
     <label for="fav-breed">What is your favourite cat breed?</label>
    <input id="fav-breed" list="breed" name="fav-breed" required>
    <datalist id="breed">
        <option value="British Shorthair">
        <option value="Maine Coon">
        <option value="Persian cat">
        <option value="Sphynx cat">
        <option value="other">
        </datalist>
        </div>

        <!--how often does this person feed their cat-->
    <p>How often do you feed your cat</p>
    
    <input id="0-1times-radio" name="times-a-day" value="0-1times" type="radio" required>
    <label for="0-1times-radio">0 to 1 times</label>
    
    <input id="2-3times-radio" name="times-a-day" value="2-3times" type="radio" required>
    <label for="2-3cups-radio">2 to 3 times</label>
    
    <input id="4-5times-radio" name="times-a-day" value="4-5times" type="radio" required>
    <label for="4-5times-radio">4 to 5 times</label>
    
    <input id="6plus-times-radio" name="times-a-day" value="6plus-times" type="radio" required>
    <label for="6plus-times-radio">6 or more times</label>

    <!--brands of cat food-->
<p>What brand food does your cat enjoy?</p>
<div>
    <input type="checkbox" id="go-cat-checkbox" name="go-cat">
    <label for="go-cat-checkbox">Go-Cat</label>
</div>
<div>
    <input type="checkbox" id="sheba-checkbox" name="sheba">
    <label for="sheba-checkbox">Sheba</label>
</div>
<div>
    <input type="checkbox" id="whiskas-checkbox" name="whiskas">
    <label for="whiskas-checkbox">Whiskas</label>
</div>
<div>
    <input type="checkbox" id="purina-checkbox" name="purina">
    <label for="purina-checkbox">Purina</label>
</div>
</fieldset>

<!--feedback on our website-->
<fieldset>
    <legend>Feedback</legend>
    <label for="feedback">How can we improve your experience with us?</label>
    <br>
    <textarea id="feedback" rows="4" cols="87" name="feedback"></textarea>
</fieldset>
<!--submit your application-->
<button type="submit">
    <strong>Enter prize draw</strong>
</button>
<input type="reset" value="Reset Form">

</form>

</body>

</html>
